name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          cache: true

      - name: Check formatting
        run: pixi run ruff format --check

      - name: Run Ruff lint
        run: pixi run ruff check

  test:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          cache: true

      - name: Run tests
        run: pixi run python -m pytest tests
